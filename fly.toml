app = "bereu-claude-agent"
primary_region = "nrt"

[build]

[env]
NODE_ENV = "production"

[http_service]
internal_port = 3000
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/health"
timeout = "5s"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"

[[mounts]]
source = "repos_workspace"
destination = "/app/workspace"
